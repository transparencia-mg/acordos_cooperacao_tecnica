jobs:
  publish_ckan:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dpckan frictionless requests

      - name: Gerar datapackage.json
        run: |
          python scripts/gerar_datapackage.py

      - name: Verificar datapackage
        run: |
          ls -l datapackage
          cat datapackage/datapackage.json

      - name: Publicar no CKAN
        env:
          CKAN_HOST: ${{ secrets.CKAN_HOST }}
          CKAN_KEY: ${{ secrets.CKAN_KEY }}
        run: |
          python scripts/publish_ckan.py
