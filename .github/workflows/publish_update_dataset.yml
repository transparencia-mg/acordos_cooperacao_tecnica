jobs:
  publish_ckan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install ckanapi

      - name: Gerar datapackage.json
        run: |
          python scripts/gerar_datapackage.py

      - name: Commit datapackage.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza datapackage.json automaticamente"
          file_pattern: datapackage/datapackage.json

      - name: Publicar dataset e recursos no CKAN
        env:
          CKAN_KEY: ${{ secrets.CKAN_KEY }}
        run: |
          python scripts/publish_ckan.py
